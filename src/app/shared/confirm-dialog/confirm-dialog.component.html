<h2 mat-dialog-title>{{ data.title || 'Confirmar ação' }}</h2>

<mat-dialog-content>
  <p>{{ data.message }}</p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancelar()">
    {{ data.cancelText || 'Cancelar' }}
  </button>

  <button mat-raised-button color="warn" (click)="confirmar()">
    {{ data.confirmText || 'Excluir' }}
  </button>
</mat-dialog-actions>
