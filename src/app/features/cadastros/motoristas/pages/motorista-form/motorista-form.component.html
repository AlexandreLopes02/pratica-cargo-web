<div class="page">
  <div class="header">
    <div>
      <div class="crumb">Cadastros / Motoristas</div>
      <h1>{{ id ? 'Editar Motorista' : 'Novo Motorista' }}</h1>
    </div>
  </div>

  <mat-card class="card">
    <mat-card-content>
      <form
        [formGroup]="form"
        (ngSubmit)="submit()"
        class="form"
        [class.is-loading]="loading"
      >
        <div class="grid">
          <!-- Nome -->
          <mat-form-field appearance="outline" class="field">
            <mat-label>Nome</mat-label>
            <input matInput formControlName="nome" placeholder="Ex: João da Silva" />
            <mat-error *ngIf="form.get('nome')?.touched && form.get('nome')?.invalid">
              Informe um nome válido (mín. 3 letras)
            </mat-error>
          </mat-form-field>

          <!-- CPF (com mask) -->
          <mat-form-field appearance="outline" class="field">
            <mat-label>CPF</mat-label>
            <input
              matInput
              formControlName="cpf"
              placeholder="000.000.000-00"
              mask="000.000.000-00"
            />
            <mat-hint>Formato: 000.000.000-00</mat-hint>
            <mat-error *ngIf="form.get('cpf')?.touched && form.get('cpf')?.invalid">
              CPF inválido. Use o formato 000.000.000-00
            </mat-error>
          </mat-form-field>
        </div>

        <div class="actions">
          <button
            mat-raised-button
            color="primary"
            type="submit"
            [disabled]="loading || form.invalid"
          >
            <mat-icon>save</mat-icon>
            {{ id ? 'Atualizar' : 'Salvar' }}
          </button>

          <button
            mat-stroked-button
            type="button"
            (click)="cancelar()"
            [disabled]="loading"
          >
            Cancelar
          </button>

          <div class="saving" *ngIf="loading">
            <mat-spinner diameter="18"></mat-spinner>
            <span>Salvando...</span>
          </div>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
