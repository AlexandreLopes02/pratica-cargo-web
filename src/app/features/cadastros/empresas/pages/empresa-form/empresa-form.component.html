<div class="page">
  <div class="header">
    <div>
      <div class="crumb">Cadastros / Empresas</div>
      <h1>{{ id ? 'Editar Empresa' : 'Nova Empresa' }}</h1>
    </div>
  </div>

  <mat-card class="card">
    <mat-card-content>
      <form
        [formGroup]="form"
        (ngSubmit)="submit()"
        class="form"
        [class.is-loading]="loading"
      >
        <div class="grid">
          <!-- Nome da empresa -->
          <mat-form-field appearance="outline" class="field">
            <mat-label>Nome da empresa</mat-label>
            <input
              matInput
              formControlName="nome"
              placeholder="Ex: Desenvolvendo Inteligência"
            />
            <mat-error *ngIf="form.get('nome')?.touched && form.get('nome')?.invalid">
              Informe um nome válido (mín. 3 letras)
            </mat-error>
          </mat-form-field>

          <!-- CNPJ (com mask) -->
          <mat-form-field appearance="outline" class="field">
            <mat-label>CNPJ</mat-label>
            <input
              matInput
              formControlName="cnpj"
              placeholder="00.000.000/0000-00"
              mask="00.000.000/0000-00"
            />
            <mat-hint>Formato: 00.000.000/0000-00</mat-hint>
            <mat-error *ngIf="form.get('cnpj')?.touched && form.get('cnpj')?.invalid">
              CNPJ inválido. Use o formato 00.000.000/0000-00
            </mat-error>
          </mat-form-field>

          <!-- Endereço (opcional) -->
          <mat-form-field appearance="outline" class="field field-full">
            <mat-label>Endereço (opcional)</mat-label>
            <input
              matInput
              formControlName="endereco"
              placeholder="Ex: Rua Exemplo, 123 - São Paulo"
            />
          </mat-form-field>
        </div>

        <div class="actions">
          <button
            mat-raised-button
            color="primary"
            type="submit"
            [disabled]="loading || form.invalid"
          >
            <mat-icon>save</mat-icon>
            {{ id ? 'Atualizar' : 'Salvar' }}
          </button>

          <button
            mat-stroked-button
            type="button"
            (click)="cancelar()"
            [disabled]="loading"
          >
            Cancelar
          </button>

          <div class="saving" *ngIf="loading">
            <mat-spinner diameter="18"></mat-spinner>
            <span>Salvando...</span>
          </div>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
